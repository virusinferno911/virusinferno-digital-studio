name: Ping Supabase to Prevent Pause

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  # This allows you to manually trigger the workflow from the GitHub Actions tab if you want to test it
  workflow_dispatch: 

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send ping to Supabase REST API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"